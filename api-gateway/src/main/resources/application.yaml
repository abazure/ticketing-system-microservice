spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: inventory-service
              uri: http://inventory-service:8080
              predicates:
                - Path=/api/v1/inventories/**
            - id: booking-service
              uri: http://booking-service:8080
              predicates:
                - Path=/api/v1/booking/**